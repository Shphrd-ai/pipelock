# Enterprise Conductor control plane.
#
# The chart references existing Secrets only. Create TLS, token, license, CRL,
# and trust-key Secrets out of band with your normal secret manager.

mode: conductor

# Pin the control-plane image by digest. Leave tag empty so it does not combine
# with the digest. Replace the digest with the one you have verified for the
# release you are deploying.
image:
  tag: ""
  digest: "sha256:e8e249d2dd1b579f995f0f5a75cfab13fb8505a8ffc33c2cec7a6418290d9098"

license:
  enabled: true
  existingSecret: pipelock-enterprise-license
  secretKey: license.token
  crlSecretRef:
    name: pipelock-license-crl
    key: license.crl

conductor:
  conductorID: conductor-prod-1
  followerTrustDomain: pipelock.local
  service:
    type: ClusterIP
    port: 8895
    probePort: 9092
  tls:
    serverSecretRef:
      name: conductor-server-tls
    clientCASecretRef:
      name: conductor-follower-ca
      key: ca.crt
  tokens:
    publisher:
      secretRef:
        name: conductor-publisher-token
        key: token
    auditor:
      secretRef:
        name: conductor-auditor-token
        key: token
    admin:
      secretRef:
        name: conductor-admin-token
        key: token
  trustedAuditKeys:
    - id: audit-signer-prod
      orgID: org-prod
      fleetID: fleet-prod
      instanceID: ""
      secretRef:
        name: conductor-audit-keys
        key: audit-signer-prod.pub
  trustedControlKeys:
    - id: remote-kill-prod
      purpose: remote-kill-signing
      secretRef:
        name: conductor-control-keys
        key: remote-kill-prod.pub
    - id: rollback-prod
      purpose: policy-bundle-rollback
      secretRef:
        name: conductor-control-keys
        key: rollback-prod.pub
  persistence:
    size: 50Gi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  preset: restricted
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: pipelock-fleet
          podSelector:
            matchLabels:
              pipelock.io/follower: "true"
      ports:
        - port: 8895
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: pipelock-ops
          podSelector:
            matchLabels:
              pipelock.io/operator: "true"
      ports:
        # Kubelet probe traffic is node-originated and not governed by
        # Kubernetes NetworkPolicy ingress selectors. If your CNI enforces
        # host-to-workload policy, also allow kubelet-to-pod health checks to
        # this probe port with hostEndpoint/host-protection rules. This rule is
        # for operator/Prometheus access.
        - port: 9092
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: pipelock-kms
          podSelector:
            matchLabels:
              pipelock.io/signing-service: "true"
      ports:
        - port: 443
          protocol: TCP
