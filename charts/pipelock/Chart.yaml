apiVersion: v2
name: pipelock
description: Agent firewall for AI agents. Network scanning, process containment, and tool policy enforcement.
type: application
version: 0.5.0
appVersion: "2.8.0"
home: https://pipelab.org
sources:
  - https://github.com/Shphrd-ai/pipelock
maintainers:
  - name: Josh Waldrep
    url: https://github.com/luckyPipewrench
keywords:
  - ai-security
  - agent-firewall
  - mcp
  - dlp
  - prompt-injection
  - egress-control
icon: https://raw.githubusercontent.com/Shphrd-ai/pipelock/main/assets/pipelock-logo.svg
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/changesURL: https://github.com/Shphrd-ai/pipelock/releases
  artifacthub.io/links: |
    - name: Documentation
      url: https://pipelab.org/learn/
    - name: Release notes
      url: https://github.com/Shphrd-ai/pipelock/releases
    - name: Audit Packet verifier
      url: https://github.com/Shphrd-ai/pipelock-verify-python
  artifacthub.io/changes: |
    - kind: added
      description: Pipelock appVersion 2.8.0 with defer authorization, fleet receipt reporting, and operator lifecycle tooling.
    - kind: added
      description: Free verifier support for offline Fleet Receipt Reports.
    - kind: fixed
      description: Image digest rendering now uses repository@sha256 instead of placing a digest in the tag field.
    - kind: fixed
      description: Security fixes for scanner fail-closed behavior, support-bundle redaction, and signing-key loading.
